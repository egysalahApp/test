    <style>
        body { 
            font-family: 'Readex Pro', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        html { scroll-behavior: smooth; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fly-out { animation: flyOut 0.4s ease-in forwards; }
        @keyframes flyOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(120px) scale(0.5); opacity: 0; }
        }

        .fade-opacity { animation: fadeInOpacity 0.3s ease-out forwards; }
        @keyframes fadeInOpacity {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .smooth-expand { animation: smoothExpand 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; overflow: hidden; }
        @keyframes smoothExpand {
            0% { max-height: 0; opacity: 0; transform: translateY(-10px); }
            100% { max-height: 1000px; opacity: 1; transform: translateY(0); }
        }
        
        button { outline: none; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* تأثيرات البطاقات الإضافية لقسم صواب وخطأ */
        .perspective-1000 { perspective: 1000px; -webkit-perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        .rotate-y-0 { transform: rotateY(0deg); -webkit-transform: rotateY(0deg); }

            { text: "الاستعارة هي في الأصل تشبيه بليغ حُذف أحد طرفيه.", answer: true, explanation: "هذه هي القاعدة الأساسية للاستعارة.", hint: "في الاستعارة نحذف المشبه أو المشبه به." },
            { text: "في الاستعارة التمثيلية نشبه كلمة مفردة بكلمة مفردة أخرى.", answer: false, explanation: "الاستعارة التمثيلية نشبه فيها (حالة كاملة) بـ (حالة كاملة).", hint: "التمثيلية تحتاج لمشهد أو صورة مركبة." },
            { text: "«رأيت بحرًا يتصدق على الفقراء» هي استعارة تصريحية.", answer: true, explanation: "لأنه صرح بالمشبه به (بحرًا) وحذف المشبه (الرجل الكريم).", hint: "كلمة (بحر) مذكورة صراحة مكان الرجل." },
            { text: "الاستعارة يجب أن يرافقها دليل (قرينة) يمنع المعنى الحقيقي.", answer: true, explanation: "عندما نقول (تضحك الحياة) فكلمة الحياة دليل على أننا لا نقصد الضحك الحقيقي.", hint: "الاستعارة هي نوع من المجاز." }

        const SECTIONS = [
            { id: 'intro', label: 'قبل أن نبدأ', theme: 'sky', baseWeight: '600', hoverWeight: '700', progressWeight: '500' },

            initEvents() {
                // إضافة مستمعات الأحداث العامة للسحب والإفلات لبطاقات "صواب وخطأ"
                document.addEventListener('mousemove', (e) => this.handleDragMove(e));
                document.addEventListener('touchmove', (e) => this.handleDragMove(e), { passive: false });
                document.addEventListener('mouseup', (e) => this.handleDragEnd(e));
                document.addEventListener('touchend', (e) => this.handleDragEnd(e));

            initSectionData() {
                this.state.quizData = shuffleArray(QUIZ_QUESTIONS).map((q, idx) => {
                    const mappedOptions = q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correct }));
                    return { originalQuestion: q, options: mappedOptions, answered: false, selectedOption: null, showHint: false };
                });

                this.state.tfData = shuffleArray(TF_QUESTIONS).map(q => ({
                    originalQuestion: q,
                    options: [
                        { text: "صواب", isCorrect: true === q.answer },
                        { text: "خطأ", isCorrect: false === q.answer }
                    ],
                    answered: false, selectedOption: null, showHint: false
                }));

                this.state.spottingData = shuffleArray(SPOTTING_QUESTIONS).map(q => ({
                    originalQuestion: q, answered: false, selectedIndex: null, showHint: false
                }));

                this.state.classifyData = {
                    questions: shuffleArray(CLASSIFY_PHRASES).map(q => ({ originalQuestion: q, showHint: false, hasErrored: false })),
                    currentIndex: 0, status: 'idle', boxCounts: { makneya: 0, tasreheya: 0, tamtheleya: 0 }, animatingOut: false
                };

                this.state.tfUI = { currentIndex: 0, status: 'idle', isHintFlipped: false, isFeedbackFlipped: false, lastAnswerCorrect: false, lastAnswerText: '' };
            },

            renderLayout() {
                const root = document.getElementById('app-root');
                root.innerHTML = `
                    <div id="main-header" class="w-full text-center py-6 bg-transparent flex flex-col items-center">
                        <a href="https://www.youtube.com/egysalah" target="_blank" rel="noopener noreferrer"

                            <span>العربية السهلة</span>
                            ${ICONS.youtube}
                        </a>
                        <h2 class="text-lg font-bold text-slate-600 hover:text-slate-700 transition-all duration-300 hover:-translate-x-1 inline-block cursor-default">محمود صلاح</h2>

                        </div>

                        </a>
                    </footer>
                `;
            },

            updateUI() {
                this.updateTabs();
                this.updateSectionsVisibility();
                
                if (this.state.activeTab === 'classify') {
                    document.getElementById('section-classify').innerHTML = this.renderClassifySectionHTML();
                } else if (this.state.activeTab === 'spotting') {
                    document.getElementById('section-spotting').innerHTML = this.renderStandardSectionHTML('spotting');
                } else if (this.state.activeTab === 'quiz') {
                    document.getElementById('section-quiz').innerHTML = this.renderStandardSectionHTML('quiz');
                } else if (this.state.activeTab === 'tf') {
                    document.getElementById('section-tf').innerHTML = this.renderStandardSectionHTML('tf');
                }

                this.checkFinalEvaluation();
            },

            updateTabs() {
                const wrapper = document.getElementById('tabs-wrapper');
                let html = '';
                
                SECTIONS.forEach(section => {
                    const isActive = this.state.activeTab === section.id;
                    const secProgress = this.state.progress[section.id];
                    const isDone = secProgress.total > 0 && secProgress.answered === secProgress.total;
                    
                    let activeClass = isActive ? `bg-${section.theme}-${section.baseWeight} text-white border-${section.theme}-${section.baseWeight} shadow-md` : "bg-white text-slate-600 border-slate-200";

                    html += `
                        <button id="tab-${section.id}" type="button" onclick="App.handleTabChange('${section.id}')" 
                                class="shrink-0 whitespace-nowrap px-6 py-2 rounded-full font-semibold text-lg md:text-xl border-2 transition-all flex items-center justify-center gap-2 ${activeClass}">
                            ${section.label}
                            ${isDone && !isActive ? ICONS.checkCircle : ''}
                        </button>
                    `;
                });
                
                wrapper.innerHTML = html;

                const currentProgress = this.state.progress[this.state.activeTab];
                const progressPercent = currentProgress.total > 0 ? (currentProgress.answered / currentProgress.total) * 100 : 0;
                const progressBar = document.getElementById('progress-bar');
                const currentSection = SECTIONS.find(s => s.id === this.state.activeTab);
                
                progressBar.className = `h-full transition-all duration-500 ease-out bg-${currentSection.theme}-${currentSection.progressWeight}`;
                progressBar.style.width = `${progressPercent}%`;
            },

            updateSectionsVisibility() {
                const subtitles = {
                    intro: 'مراجعة سريعة ومبسطة لأنواع الاستعارة قبل بدء التدريبات',

                    spotting: 'ابحث عن الكلمة الخيالية! حدد الكلمة التي تمثل الاستعارة في كل جملة',
                    quiz: 'اقرأ السؤال جيدًا، ثم اختر الإجابة الصحيحة من الخيارات المتاحة',
                    tf: 'اسحب البطاقة يمينًا للإجابة بـ "صواب" ويسارًا للإجابة بـ "خطأ"'
                };
                
                const subtitleEl = document.getElementById('section-subtitle');
                const currentSection = SECTIONS.find(s => s.id === this.state.activeTab);
                const theme = currentSection ? currentSection.theme : 'slate';

                if (subtitleEl) {
                    subtitleEl.classList.remove('fade-opacity');
                    void subtitleEl.offsetWidth;
                    subtitleEl.innerHTML = subtitles[this.state.activeTab] || '';
                    
                    subtitleEl.className = `text-lg md:text-xl font-medium py-3 md:py-4 px-5 md:px-8 rounded-2xl block w-full fade-opacity leading-relaxed transition-colors duration-300 bg-${theme}-50 bg-opacity-60 text-${theme}-800 shadow-sm`;
                }

                SECTIONS.forEach(sec => {
                    const el = document.getElementById(`section-${sec.id}`);
                    if (el) el.className = this.state.activeTab === sec.id ? 'block' : 'hidden';
                });
            },

            showSectionResult(sectionId, sectionDef, progress) {
                const resultArea = document.getElementById(`section-result-area-${sectionId}`);
                if (resultArea) {
                    resultArea.innerHTML = `
                        <div class="mt-12 p-8 md:p-10 bg-white border-2 border-${sectionDef.theme}-200 rounded-2xl shadow-sm text-center max-w-2xl mx-auto w-full smooth-expand">
                            <h3 class="text-2xl md:text-3xl font-semibold text-slate-700 mb-6">نتيجتك في قسم (${sectionDef.label})</h3>
                            <div class="text-5xl font-bold text-${sectionDef.theme}-${sectionDef.baseWeight}">
                                ${toArabicNum(progress.score)} <span class="text-3xl text-slate-400 font-medium mx-2">من</span> ${toArabicNum(progress.total)}
                            </div>
                        </div>`;
                }
                const footerArea = document.getElementById(`section-footer-area-${sectionId}`);
                if (footerArea) {
                    footerArea.innerHTML = `<div class="smooth-expand w-full">${this.renderSectionFooterControls(sectionId, true)}</div>`;

            renderIntroSectionHTML() {

                                <div class="bg-violet-100 p-4 rounded-2xl mb-5 transition-transform group-hover:scale-110 duration-300 shadow-inner">
                                    ${ICONS.loud}

                                <h3 class="text-2xl font-bold text-slate-700 mb-4">٢. التصريحية</h3>

                                </p>
                                <div class="w-full bg-sky-50 p-4 md:p-5 rounded-2xl border border-sky-100 text-right mt-auto transition-colors group-hover:bg-sky-100/50">

                                    <span class="text-lg md:text-xl text-sky-800 leading-relaxed block">

                        <div class="flex justify-center mt-10 pt-4">

                                هيا نبدأ التدريبات

            renderStandardSectionHTML(sectionId) {
                if (sectionId === 'tf') {
                    return this.renderTfSwipeSectionHTML();
                }

                const sectionData = SECTIONS.find(s => s.id === sectionId);
                const progress = this.state.progress[sectionId];
                const isComplete = progress.total > 0 && progress.answered === progress.total;
                const questions = this.state[`${sectionId}Data`];
                
                let html = '<div class="fade-in">';
                
                questions.forEach((q, idx) => {
                    html += `<div id="${sectionId}-wrapper-${idx}">`;
                    if (sectionId === 'spotting') html += this.renderSpottingCard(q, idx, sectionData.theme, sectionId);
                    else html += this.renderQuestionCard(q, idx, sectionId, sectionData.theme);
                    html += `</div>`;
                });

                html += `<div id="section-result-area-${sectionId}">`;
                if (isComplete) {
                    html += `
                        <div class="mt-12 p-8 md:p-10 bg-white border-2 border-${sectionData.theme}-200 rounded-2xl shadow-sm text-center max-w-2xl mx-auto w-full smooth-expand">
                            <h3 class="text-2xl md:text-3xl font-semibold text-slate-700 mb-6">نتيجتك في قسم (${sectionData.label})</h3>
                            <div class="text-5xl font-bold text-${sectionData.theme}-${sectionData.baseWeight}">
                                ${toArabicNum(progress.score)} <span class="text-3xl text-slate-400 font-medium mx-2">من</span> ${toArabicNum(progress.total)}
                            </div>
                        </div>
                    `;
                }
                html += `</div><div id="section-footer-area-${sectionId}" class="w-full">`;
                html += this.renderSectionFooterControls(sectionId, isComplete);
                html += `</div></div>`;
                
                return html;
            },

            renderTfSwipeSectionHTML() {
                const theme = SECTIONS.find(s => s.id === 'tf').theme;
                const progress = this.state.progress['tf'];
                const state = this.state.tfUI;
                const isComplete = state.currentIndex >= this.state.tfData.length;

                let html = '<div class="fade-in">';

                if (!isComplete && this.state.tfData[state.currentIndex]) {
                    const qState = this.state.tfData[state.currentIndex];
                    const q = qState.originalQuestion;
                    const isLastQuestion = state.currentIndex === this.state.tfData.length - 1;

                    if (state.status === 'idle') {
                        html += `
                        <div class="relative mx-auto w-full max-w-sm aspect-[4/5] md:aspect-[3/4] mb-20 perspective-1000 select-none">
                            <div id="tf-draggable-card"
                                 onmousedown="App.handleDragStart(event)"
                                 ontouchstart="App.handleDragStart(event)"
                                 class="w-full h-full cursor-grab active:cursor-grabbing absolute inset-0 z-10 transition-transform duration-300">
                                
                                <div id="tf-card-inner" class="w-full h-full relative preserve-3d transition-transform duration-500 ${state.isHintFlipped ? 'rotate-y-180' : ''}">
                                    
                                    <!-- وجه البطاقة (السؤال) -->
                                    <div class="backface-hidden rotate-y-0 w-full h-full absolute inset-0 z-10">
                                        <div class="w-full h-full bg-white border-2 border-slate-200 rounded-3xl shadow-lg flex flex-col overflow-hidden relative">
                                            <!-- طبقات الألوان عند السحب -->
                                            <div id="tf-overlay-right" class="absolute inset-0 bg-emerald-500/90 z-20 opacity-0 transition-opacity flex justify-center items-center pointer-events-none">
                                                <div class="bg-white p-4 rounded-full text-emerald-500 shadow-xl scale-150">${ICONS.checkCircleLarge}</div>
                                            </div>
                                            <div id="tf-overlay-left" class="absolute inset-0 bg-rose-500/90 z-20 opacity-0 transition-opacity flex justify-center items-center pointer-events-none">
                                                <div class="bg-white p-4 rounded-full text-rose-500 shadow-xl scale-150">${ICONS.xCircleLarge}</div>
                                            </div>

                                            <!-- محتوى الوجه -->
                                            <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center z-10">
                                                <span class="text-${theme}-600 font-bold text-lg md:text-xl">البطاقة ${toArabicNum(state.currentIndex + 1)}</span>
                                                <button onclick="App.toggleTfHint();" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm md:text-base font-bold transition-all text-amber-500 hover:bg-amber-50 active:scale-95 z-30 relative cursor-pointer">
                                                    💡 تلميح
                                                </button>
                                            </div>
                                            <div class="flex-grow flex items-center justify-center p-6 text-center z-10 pointer-events-none">
                                                <h3 class="text-2xl md:text-3xl font-semibold leading-relaxed text-slate-800">«${q.text}»</h3>
                                            </div>
                                            <div class="p-4 bg-slate-50/50 text-center text-slate-400 text-sm font-medium z-10 pointer-events-none border-t border-slate-100">
                                                اسحب يمينًا للصواب 🟢 ، ويسارًا للخطأ 🔴

            },

            // دوال التعامل مع السحب والإفلات (Drag and Drop Mechanics)
            handleDragStart(e) {
                // منع تشغيل حدث السحب إذا كان العنصر المستهدف أو أحد آبائه زرًا (Button)
                if (e.target.closest('button')) return;

                if (this.state.tfUI.status !== 'idle' || this.state.tfUI.isHintFlipped) return;
                this.dragState.isDragging = true;
                this.dragState.startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                this.dragState.startY = e.type.includes('mouse') ? e.pageY : e.touches[0].clientY;
                this.dragState.currentX = this.dragState.startX;
                this.dragState.el = document.getElementById('tf-draggable-card');
                
                if (this.dragState.el) {
                    this.dragState.el.style.transition = 'none'; // تعطيل الأنيميشن أثناء السحب
                }
            },

            handleDragMove(e) {
                if (!this.dragState.isDragging || !this.dragState.el) return;

                const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                const currentY = e.type.includes('mouse') ? e.pageY : e.touches[0].clientY;
                const deltaX = currentX - this.dragState.startX;
                const deltaY = currentY - this.dragState.startY;

                // منع التمرير الرأسي للشاشة إذا كان السحب أفقيًا بشكل أساسي
                if (Math.abs(deltaX) > Math.abs(deltaY) && e.cancelable) {
                    e.preventDefault();
                }

                const rotate = deltaX * 0.05; // زاوية الميلان
                this.dragState.el.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;

                // التحكم في شفافية الألوان (يمين أخضر، يسار أحمر)
                const rightOverlay = document.getElementById('tf-overlay-right');
                const leftOverlay = document.getElementById('tf-overlay-left');
                
                if (rightOverlay && leftOverlay) {
                    if (deltaX > 0) {
                        rightOverlay.style.opacity = Math.min(deltaX / 120, 0.9);
                        leftOverlay.style.opacity = 0;
                    } else {
                        leftOverlay.style.opacity = Math.min(Math.abs(deltaX) / 120, 0.9);
                        rightOverlay.style.opacity = 0;
                    }
                }
            },

            handleDragEnd(e) {
                if (!this.dragState.isDragging || !this.dragState.el) return;
                this.dragState.isDragging = false;
                
                const currentX = e.type.includes('mouse') ? e.pageX : (e.changedTouches ? e.changedTouches[0].clientX : this.dragState.currentX);
                const deltaX = currentX - this.dragState.startX;
                const threshold = 100; // مسافة السحب المطلوبة لاعتبار الإجابة

                this.dragState.el.style.transition = 'transform 0.4s ease-out'; // إعادة تشغيل الأنيميشن

                if (deltaX > threshold) {
                    this.handleTfAction(true); // سحب لليمين (صواب)
                } else if (deltaX < -threshold) {
                    this.handleTfAction(false); // سحب لليسار (خطأ)
                } else {
                    // العودة للمنتصف إذا لم يتجاوز المسافة المحددة
                    this.dragState.el.style.transform = `translateX(0px) rotate(0deg)`;
                    const rightOverlay = document.getElementById('tf-overlay-right');
                    const leftOverlay = document.getElementById('tf-overlay-left');
                    if (rightOverlay) rightOverlay.style.opacity = 0;
                    if (leftOverlay) leftOverlay.style.opacity = 0;
                }
                
                this.dragState.el = null;
            },

            handleTfAction(isTrueAction) {
                if (this.state.tfUI.status !== 'idle') return;
                
                // منع القفز الافتراضي للمتصفح عند اختفاء الأزرار
                if (document.activeElement) document.activeElement.blur();

                const card = document.getElementById('tf-draggable-card');
                if (card) {
                    // تأثير طيران البطاقة
                    card.style.transition = 'all 0.4s ease-out';
                    card.style.transform = `translateX(${isTrueAction ? 150 : -150}%) rotate(${isTrueAction ? 30 : -30}deg)`;
                    card.style.opacity = '0';
                }

                const state = this.state.tfUI;
                const qState = this.state.tfData[state.currentIndex];
                const isCorrect = isTrueAction === qState.originalQuestion.answer;

                qState.answered = true;
                this.recordProgress('tf', isCorrect);

                // الانتظار حتى انتهاء انيميشن السحب ثم إظهار التغذية الراجعة
                setTimeout(() => {
                    state.status = 'feedback';
                    state.lastAnswerCorrect = isCorrect;
                    state.lastAnswerText = isTrueAction ? "صواب" : "خطأ";
                    this.updateUI();
                    this.updateTabs();
                }, 400);
            },

            handleTfNext() {
                // منع القفز الافتراضي للمتصفح عند الانتقال للسؤال التالي
                if (document.activeElement) document.activeElement.blur();
                
                const state = this.state.tfUI;
                state.currentIndex++;
                state.status = 'idle';
                state.isHintFlipped = false;
                state.isFeedbackFlipped = false;
                
                this.updateUI();
                this.checkFinalEvaluation();
            },

            toggleTfHint() {
                this.state.tfUI.isHintFlipped = !this.state.tfUI.isHintFlipped;
                const innerCard = document.getElementById('tf-card-inner');
                if (innerCard) {
                    if (this.state.tfUI.isHintFlipped) {
                        innerCard.classList.add('rotate-y-180');
                    } else {
                        innerCard.classList.remove('rotate-y-180');
                    }
                } else {
                    this.updateUI();
                }
            },

            toggleTfFeedbackFlip() {
                this.state.tfUI.isFeedbackFlipped = !this.state.tfUI.isFeedbackFlipped;
                const innerCard = document.getElementById('tf-feedback-inner');
                if (innerCard) {
                    if (this.state.tfUI.isFeedbackFlipped) {
                        innerCard.classList.add('rotate-y-180');
                    } else {
                        innerCard.classList.remove('rotate-y-180');
                    }
                } else {

                }

                return `

                const isSpotting = type === 'spotting';
                const newHTML = isSpotting ? this.renderSpottingCard(qState, qIndex, theme, sectionId) : this.renderQuestionCard(qState, qIndex, sectionId, theme);
                const mainCard = document.getElementById(isSpotting ? `spotting-q-${qIndex}` : `${sectionId}-q-${qIndex}`);
                
                if (!mainCard) {
                    document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = newHTML;
                    return;
                }

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = newHTML;
                
                const areas = ['hint-area', 'options-area', 'answer-area'];
                areas.forEach(area => {
                    const oldEl = document.getElementById(`${area}-${sectionId}-${qIndex}`);
                    const newEl = tempDiv.querySelector(`#${area}-${sectionId}-${qIndex}`);
                    if (oldEl && newEl) {
                        oldEl.innerHTML = newEl.innerHTML;
                        oldEl.className = newEl.className;
                    }
                });
                
                mainCard.className = tempDiv.firstElementChild.className;
            },

            renderClassifySectionHTML() {
                const theme = 'amber';
                const state = this.state.classifyData;
                const { questions, currentIndex, status, boxCounts, animatingOut } = state;
                const isComplete = currentIndex >= questions.length;
                
                let html = '';

                if (!isComplete && questions[currentIndex]) {
                    const currentQuestionState = questions[currentIndex];
                    const currentQuestion = currentQuestionState.originalQuestion;
                    const showHint = currentQuestionState.showHint;
                    
                    const hintFadeClass = currentQuestionState.hintAnimate ? 'smooth-expand' : '';
                    const feedbackFadeClass = state.feedbackAnimate ? 'smooth-expand' : '';
                    
                    const boxes = [
                        { id: 'makneya', label: 'مكنية', colorClass: 'border-amber-200 text-amber-700 bg-amber-50', hoverClass: 'hover:border-amber-400 hover:bg-amber-100' },
                        { id: 'tasreheya', label: 'تصريحية', colorClass: 'border-violet-200 text-violet-700 bg-violet-50', hoverClass: 'hover:border-violet-400 hover:bg-violet-100' },
                        { id: 'tamtheleya', label: 'تمثيلية', colorClass: 'border-sky-200 text-sky-700 bg-sky-50', hoverClass: 'hover:border-sky-400 hover:bg-sky-100' }
                    ];

                    let boxesHTML = '';
                    boxes.forEach(b => {
                        let btnClass = `flex-1 flex flex-col items-center justify-center p-3 md:p-6 border-2 md:border-4 rounded-2xl md:rounded-3xl transition-all duration-300 ${b.colorClass} `;
                        if (status === 'idle') {
                            btnClass += `${b.hoverClass} hover:-translate-y-2 cursor-pointer shadow-sm hover:shadow-md`;
                        } else {
                            btnClass += `opacity-60 cursor-default grayscale-[30%]`;
                        }
                        
                        boxesHTML += `
                            <button ${status !== 'idle' ? 'disabled' : ''} onclick="App.handleSortClick('${b.id}')" class="${btnClass}">
                                ${ICONS.tray}
                                <span class="font-bold text-xl md:text-2xl mb-2 md:mb-3">${b.label}</span>
                                <div class="bg-white/90 px-4 md:px-5 py-1 rounded-full shadow-inner font-black text-xl border border-white/50">
                                    ${toArabicNum(boxCounts[b.id])}
                                </div>
                            </button>
                        `;
                    });

                    const feedbackText = status === 'correct' 
                        ? currentQuestion.explanation 
                        : "حاول مرة أخرى";

                    html += `
                        <div class="flex flex-col items-center w-full">
                            <div class="w-full bg-white p-5 md:p-6 rounded-3xl shadow-lg border-2 border-slate-200 transition-colors duration-300 relative z-10 flex flex-col justify-start ${animatingOut ? 'fly-out' : 'fade-in'}">
                                
                                <div class="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-100 mb-6 w-full mx-auto">
                                    <div class="flex items-center justify-between mb-2 md:mb-3">
                                        <span class="text-amber-600 font-bold text-lg md:text-xl">
                                            البطاقة ${toArabicNum(currentIndex + 1)}
                                        </span>
                                        <button onclick="App.toggleHint('classify', ${currentIndex})" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-lg md:text-xl font-bold transition-all active:scale-95 text-amber-500 hover:bg-amber-50">
                                            💡 تلميح
                                        </button>
                                    </div>
                                    
                                    <h3 class="text-2xl md:text-3xl font-semibold leading-snug text-slate-800 text-right">«${currentQuestion.text}»</h3>

                                    <div id="hint-area-classify-${currentIndex}" class="${showHint ? `block w-full ${hintFadeClass}` : 'hidden'}">
                                        <div class="mt-4 bg-amber-50 text-amber-900 p-4 rounded-xl text-xl font-medium border border-amber-200 flex gap-2 items-start text-right">
                                            <span class="text-amber-500 font-semibold mt-1 shrink-0">💡</span>
                                            <span class="leading-relaxed">${currentQuestion.hint}</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="${status !== 'idle' ? `block w-full ${feedbackFadeClass}` : 'hidden'}">
                                    <div class="mt-2 mb-4 p-5 rounded-2xl border text-right ${status === 'correct' ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}">
                                        <div class="flex items-center justify-start gap-2 mb-3 font-bold text-xl md:text-2xl ${status === 'correct' ? 'text-emerald-700' : 'text-rose-700'}">
                                            ${status === 'correct' ? ICONS.checkCircleLarge : ICONS.xCircleLarge}
                                            <span>${status === 'correct' ? 'إجابة صحيحة' : 'إجابة خاطئة'}</span>
                                        </div>
                                        ${status === 'correct' ? `
                                        <div class="text-xl md:text-2xl font-semibold leading-relaxed mb-6 text-emerald-800 pr-1">
                                            ${currentQuestion.explanation}
                                        </div>
                                        ` : ''}
                                        <div class="flex justify-center ${status === 'correct' ? 'mt-4' : 'mt-6'}">
                                            <button onclick="${status === 'correct' ? 'App.handleSortContinue()' : 'App.handleSortRetry()'}" class="px-10 py-3 text-white font-bold text-xl md:text-2xl rounded-full active:scale-95 transition-transform shadow-md ${status === 'correct' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-rose-600 hover:bg-rose-700'}">
                                                ${status === 'correct' ? 'متابعة' : 'حاول مرة أخرى'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="flex flex-row w-full max-w-lg mx-auto gap-2 md:gap-4 mt-2 relative z-0">
                                    ${boxesHTML}
                                </div>
                            </div>
                        </div>
                    `;
                }

                html += `<div id="section-result-area-classify">`;
                if (isComplete) {
                    const progress = this.state.progress['classify'];
                    html += `
                        <div class="mt-12 p-8 md:p-10 bg-white border-2 border-${theme}-200 rounded-2xl shadow-sm text-center smooth-expand max-w-2xl mx-auto w-full">
                            <h3 class="text-2xl md:text-3xl font-semibold text-slate-700 mb-6">نتيجتك في قسم (لعبة التصنيف)</h3>
                            <div class="text-5xl font-bold text-${theme}-600">
                                ${toArabicNum(progress.score)} <span class="text-3xl text-slate-400 font-medium mx-2">من</span> ${toArabicNum(progress.total)}
                            </div>
                        </div>
                    `;
                }
                html += `</div><div id="section-footer-area-classify" class="w-full">`;
                html += this.renderSectionFooterControls('classify', isComplete);
                html += `</div>`;
                
                return html;
            },

            renderSectionFooterControls(sectionId, isComplete) {
                const sectionData = SECTIONS.find(s => s.id === sectionId);
                const isLast = sectionId === SECTIONS[SECTIONS.length - 1].id;
                
                return `
                    <div class="mt-8 flex flex-col md:flex-row justify-center items-center gap-4 mx-auto w-full">
                        <button onclick="App.handleResetSection('${sectionId}')" class="w-full md:w-auto px-8 py-3 md:py-4 rounded-full font-semibold text-xl md:text-2xl text-slate-600 bg-slate-100 hover:bg-slate-200 active:scale-95 transition-transform flex items-center justify-center gap-3">
                            ${ICONS.refresh} إعادة المحاولة
                        </button>

                        ${!isLast ? `
                            <button onclick="App.handleNextSection()" class="w-full md:w-auto px-8 md:px-10 py-3 md:py-4 rounded-full font-semibold text-xl md:text-2xl text-white shadow-md transition-transform flex items-center justify-center gap-3 active:scale-95 bg-${sectionData.theme}-${sectionData.baseWeight} hover:bg-${sectionData.theme}-${sectionData.hoverWeight}">
                                القسم التالي ${ICONS.arrowLeft}
                            </button>
                        ` : ''}
                    </div>
                `;
            },

            toggleHint(sectionId, idx) {
                const qState = sectionId === 'classify' ? this.state.classifyData.questions[idx] : this.state[`${sectionId}Data`][idx];
                qState.showHint = !qState.showHint;
                qState.hintAnimate = qState.showHint; 

                const hintArea = document.getElementById(`hint-area-${sectionId}-${idx}`);
                if (hintArea) {
                    if (qState.showHint) {
                        hintArea.className = 'block w-full smooth-expand';
                    } else {
                        hintArea.className = 'hidden';
                    }
                } else {
                    this.updateUI();
                }
                
                qState.hintAnimate = false; 
            },

            handleAnswer(sectionId, qIndex, optIndex) {
                const qState = this.state[`${sectionId}Data`][qIndex];
                if (qState.answered) return;
                
                const selectedOption = qState.options[optIndex];
                qState.answered = true;
                qState.selectedOption = selectedOption;
                qState.answerAnimate = true; 
                
                this.recordProgress(sectionId, selectedOption.isCorrect);
                
                const progress = this.state.progress[sectionId];
                const sectionDef = SECTIONS.find(s => s.id === sectionId);
                
                this.updateStandardCardPartial(sectionId, qIndex, qState, sectionDef.theme, sectionId);
                this.updateTabs();
                
                if (progress.answered === progress.total) {
                    this.showSectionResult(sectionId, sectionDef, progress);
                } 
                this.checkFinalEvaluation();
                
                qState.answerAnimate = false; 
            },

            handleSpottingClick(sectionId, qIndex, wIndex) {
                const qState = this.state.spottingData[qIndex];
                if (qState.answered) return;
                
                qState.answered = true;
                qState.selectedIndex = wIndex;
                qState.answerAnimate = true; 
                
                const isCorrect = wIndex === qState.originalQuestion.correctIndex;
                this.recordProgress(sectionId, isCorrect);
                
                const progress = this.state.progress[sectionId];
                const sectionDef = SECTIONS.find(s => s.id === sectionId);

                this.updateStandardCardPartial(sectionId, qIndex, qState, sectionDef.theme, sectionId);
                this.updateTabs();

                if (progress.answered === progress.total) {
                    this.showSectionResult(sectionId, sectionDef, progress);
                } 
                this.checkFinalEvaluation();
                
                qState.answerAnimate = false; 
            },

            handleSortClick(type) {
                const state = this.state.classifyData;
                if (state.status !== 'idle') return;

                const currentQuestionState = state.questions[state.currentIndex];
                const currentQ = currentQuestionState.originalQuestion;
                const isCorrect = type === currentQ.type;
                
                state.status = isCorrect ? 'correct' : 'incorrect';
                state.feedbackAnimate = true; 
                
                if (isCorrect) {
                    state.boxCounts[type]++;
                    this.state.progress['classify'].answered++;
                    if (!currentQuestionState.hasErrored) {
                        this.state.progress['classify'].score++;
                    }
                } else {
                    currentQuestionState.hasErrored = true;
                }
                
                this.updateUI();
                state.feedbackAnimate = false; 
            },

            handleSortRetry() {
                const state = this.state.classifyData;
                state.status = 'idle';
                this.updateUI();
            },

            handleSortContinue() {
                const state = this.state.classifyData;
                state.animatingOut = true;
                this.updateUI();
                
                setTimeout(() => {
                    state.currentIndex++;
                    state.status = 'idle';
                    state.animatingOut = false;
                    this.updateUI();
                }, 300);
            },

            recordProgress(sectionId, isCorrect) {
                this.state.progress[sectionId].answered++;
                if (isCorrect) this.state.progress[sectionId].score++;
            },

            scrollToContent() {
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        const target = document.getElementById('scroll-target');
                        if (target) {
                            const stickyTabs = document.getElementById('sticky-tabs-container');
                            const headerOffset = stickyTabs ? stickyTabs.offsetHeight : 80;
                            const elementPosition = target.getBoundingClientRect().top;
                            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                            window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                        }
                    }, 30); 
                });
            },

            scrollTabIntoView(tabId) {
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        const tabBtn = document.getElementById(`tab-${tabId}`);
                        const container = document.getElementById('tabs-container');
                        if (tabBtn && container) {
                            const containerRect = container.getBoundingClientRect();
                            const btnRect = tabBtn.getBoundingClientRect();
                            if (tabId === SECTIONS[0].id) {
                                const scrollDelta = (btnRect.right - containerRect.right) + 16;
                                container.scrollBy({ left: scrollDelta, behavior: 'smooth' });
                            } else {
                                const scrollDelta = (btnRect.left + btnRect.width / 2) - (containerRect.left + containerRect.width / 2);
                                container.scrollBy({ left: scrollDelta, behavior: 'smooth' });
                            }
                        }
                    }, 30);
                });
            },

            handleTabChange(tabId) {
                this.state.activeTab = tabId;
                this.updateUI();
                this.scrollToContent();
                this.scrollTabIntoView(tabId);
            },

            handleNextSection() {
                const currentIndex = SECTIONS.findIndex(s => s.id === this.state.activeTab);
                if (currentIndex < SECTIONS.length - 1) {
                    this.handleTabChange(SECTIONS[currentIndex + 1].id);
                }
            },

            handleResetSection(sectionId) {
                this.state.progress[sectionId].answered = 0;
                this.state.progress[sectionId].score = 0;
                if (sectionId === 'quiz' || sectionId === 'tf' || sectionId === 'spotting') {
                    let sourceData = sectionId === 'quiz' ? QUIZ_QUESTIONS : (sectionId === 'tf' ? TF_QUESTIONS : SPOTTING_QUESTIONS);
                    let newData = shuffleArray(sourceData).map(q => {
                        let options = [];
                        if (sectionId === 'quiz') options = q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correct }));
                        else if (sectionId === 'tf') options = [{ text: "صواب", isCorrect: true === q.answer }, { text: "خطأ", isCorrect: false === q.answer }];
                        return { originalQuestion: q, options, answered: false, selectedOption: null, selectedIndex: null, showHint: false };
                    });
                    this.state[`${sectionId}Data`] = newData;
                    
                    if (sectionId === 'tf') {
                        this.state.tfUI = { currentIndex: 0, status: 'idle', isHintFlipped: false, isFeedbackFlipped: false, lastAnswerCorrect: false, lastAnswerText: '' };
                    }
                } else if (sectionId === 'classify') {
                    this.state.classifyData = {
                        questions: shuffleArray(CLASSIFY_PHRASES).map(q => ({ originalQuestion: q, showHint: false, hasErrored: false })),
                        currentIndex: 0, status: 'idle', boxCounts: { makneya: 0, tasreheya: 0, tamtheleya: 0 }, animatingOut: false
                    };
                }
                this.updateUI();
                this.scrollToContent();
            },

            handleGlobalRestart() {
                this.state.progress = {
                    intro: { answered: 0, total: 0, score: 0 },
                    classify: { answered: 0, total: CLASSIFY_PHRASES.length, score: 0 },
                    spotting: { answered: 0, total: SPOTTING_QUESTIONS.length, score: 0 },
                    quiz: { answered: 0, total: QUIZ_QUESTIONS.length, score: 0 },
                    tf: { answered: 0, total: TF_QUESTIONS.length, score: 0 }
                };
                this.initSectionData();
                this.state.activeTab = SECTIONS[0].id;
                this.updateUI();
                this.scrollTabIntoView(SECTIONS[0].id);
                requestAnimationFrame(() => {
                    const header = document.getElementById('main-header');
                    const targetTop = header ? header.offsetHeight : 80;
                    window.scrollTo({ top: targetTop, behavior: 'smooth' });
                });
            },

            checkFinalEvaluation() {
                const isAllComplete = Object.values(this.state.progress).filter(p => p.total > 0).every(p => p.answered === p.total);
                const isTfDone = this.state.tfUI.currentIndex >= this.state.tfData.length;
                const isClassifyDone = this.state.classifyData.currentIndex >= this.state.classifyData.questions.length;
                const container = document.getElementById('final-evaluation-container');
                
                if (isAllComplete && isTfDone && isClassifyDone && this.state.activeTab !== 'intro') {
                    const totalScore = Object.values(this.state.progress).reduce((acc, p) => acc + p.score, 0);
                    const totalQuestions = Object.values(this.state.progress).reduce((acc, p) => acc + p.total, 0);
                    const percentage = Math.round((totalScore / totalQuestions) * 100);
                    let message = "", color = "";
                    if (percentage < 60) { message = "تحتاج إلى مزيد من التدريب، لا تيأس وحاول مرة أخرى!"; color = "text-rose-600"; }
                    else if (percentage < 85) { message = "أداء رائع! مستواك جيد جدًا في البلاغة."; color = "text-violet-600"; }
                    else { message = "أداء استثنائي! أنت بطلٌ حقيقي وخبير في الاستعارة."; color = "text-emerald-600"; }
                    container.innerHTML = `
                        <div id="final-eval-box" class="mt-12 bg-white p-8 md:p-12 rounded-3xl shadow-lg border-2 border-indigo-200 text-center smooth-expand">
                            ${ICONS.medal}
                            <h2 class="text-3xl md:text-4xl font-bold text-slate-700 mb-4">التقييم النهائي</h2>
                            <div class="text-6xl md:text-8xl font-bold mb-6 text-slate-700">
                                <span class="${color}">${toArabicNum(totalScore)}</span>
                                <span class="text-slate-400 text-4xl md:text-5xl font-medium mx-3">من</span>
                                <span class="text-slate-500">${toArabicNum(totalQuestions)}</span>
                            </div>
                            <div class="inline-block bg-indigo-100 text-indigo-800 px-6 py-2 rounded-full font-semibold text-xl md:text-2xl mb-6">
                                النسبة المئوية: ${toArabicNum(percentage)}%
                            </div>
                            <p class="text-xl md:text-2xl font-semibold leading-relaxed ${color} mb-10">${message}</p>
                            <button onclick="App.handleGlobalRestart()" class="px-8 md:px-10 py-3 md:py-4 rounded-full font-semibold text-xl md:text-2xl text-white bg-slate-700 hover:bg-slate-800 shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-3 mx-auto">
                                ${ICONS.refresh} ابدأ من جديد
                            </button>
                        </div>
                    `;
                } else { container.innerHTML = ''; }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; window.scrollTo(0, 0); }
            catch (error) { console.warn("تم تجاهل ضبط التمرير بسبب قيود البيئة المعزولة (iFrame).", error); }
            App.init();
        });
    </script>
</body>
</html>
