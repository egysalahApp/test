<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العربية السهلة - المنصة التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Readex Pro', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        section { scroll-margin-top: 5rem; }
        .transition-all { transition: all 0.3s ease-in-out; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .collapsible-content.open { max-height: 500px; }
        .flying-card { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-800 pb-10">

    <header id="mainHeader" class="bg-white py-6 shadow-sm">
        <div class="container mx-auto px-4 text-center">
            <a href="https://www.youtube.com/egysalah" target="_blank" class="text-2xl font-bold text-slate-900 flex items-center justify-center gap-2 mb-1">
                العربية السهلة
                <svg class="w-7 h-7" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <p class="text-lg font-bold text-slate-500">محمود صلاح</p>
        </div>
    </header>

    <nav id="stickyNav" class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200 py-1">
        <div id="tabsWrapper" class="max-w-full overflow-x-auto no-scrollbar flex items-center px-4 mx-auto w-max transition-all"></div>
        <div class="w-full bg-slate-100 h-[4px] mt-1 relative">
            <div id="sectionProgressBar" class="absolute top-0 right-0 h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-8 max-w-4xl">
        <h1 id="lessonTitle" class="text-center text-2xl font-bold text-slate-700 mb-8"></h1>
        <div id="sectionsContainer"></div>
        
        <div id="finalResult" class="hidden mt-12 p-8 bg-white rounded-3xl shadow-xl border-4 border-blue-100 text-center scale-up">
            <h2 class="text-3xl font-bold mb-4">تم الإنجاز بنجاح! 🌟</h2>
            <div id="totalScore" class="text-5xl font-bold text-blue-600 mb-6"></div>
            <button onclick="location.reload()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl text-xl font-bold hover:scale-105 transition-all shadow-lg">ابدأ من جديد</button>
        </div>
    </main>

    <footer class="mt-20 py-10 text-center border-t border-slate-100">
        <a href="https://www.youtube.com/egysalah" target="_blank" class="text-slate-400 text-sm font-medium">جميع الحقوق محفوظة لقناة العربية السهلة</a>
    </footer>

    <script>
        /***********************************************************
         * ١. وقود المحرك (بيانات الدرس) - هذا ما ستقوم بتبديله فقط
         ***********************************************************/
        const lessonData = {
            title: "الممنوع من الصرف",
            sections: [
                {
                    id: "mcq_1",
                    title: "اختبار سريع",
                    type: "mcq",
                    questions: [
                        { q: "صليتُ في ....... واسعة.", options: ["مساجدَ", "مساجدٍ", "مساجدُ"], correct: "مساجدَ", hint: "صيغة منتهى الجموع تجر بالفتحة إذا لم تكن معرفة أو مضافة." }
                    ]
                },
                {
                    id: "tf_1",
                    title: "صواب وخطأ",
                    type: "tf",
                    questions: [
                        { q: "الاسم الممنوع من الصرف لا يقبل التنوين.", options: ["صواب", "خطأ"], correct: "صواب", hint: "الصرف في اللغة هو التنوين." }
                    ]
                }
            ]
        };

        /***********************************************************
         * ٢. المحرك البرمجي (Engine) - لا تلمس هذا الجزء أبداً
         ***********************************************************/
        let state = { currentSection: "", scores: {}, answeredCount: {}, completed: new Set() };

        function init() {
            document.getElementById('lessonTitle').innerText = lessonData.title;
            renderTabs();
            renderSections();
            smartNavigate(lessonData.sections[0].id);
        }

        function renderTabs() {
            const wrapper = document.getElementById('tabsWrapper');
            wrapper.innerHTML = lessonData.sections.map(s => `
                <button id="tab-${s.id}" onclick="smartNavigate('${s.id}')" class="flex items-center gap-2 px-6 py-2 whitespace-nowrap text-xl font-semibold text-slate-400 transition-all">
                    ${s.title} <span id="check-${s.id}" class="hidden text-green-500">✅</span>
                </button>
            `).join('');
        }

        function renderSections() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = lessonData.sections.map((s, idx) => `
                <section id="sec-${s.id}" class="hidden space-y-8">
                    ${s.questions ? s.questions.map((q, qIdx) => renderQuestion(s, q, qIdx)).join('') : ''}
                    <div class="flex justify-center gap-4 mt-10">
                        <button onclick="location.reload()" class="px-6 py-3 border-2 rounded-xl font-bold text-slate-500">إعادة محاولة</button>
                        ${idx < lessonData.sections.length - 1 ? `<button onclick="smartNavigate('${lessonData.sections[idx+1].id}')" class="px-6 py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg">التالي</button>` : ''}
                    </div>
                </section>
            `).join('');
        }

        function renderQuestion(section, q, idx) {
            let opts = [...q.options];
            if (section.type !== 'tf') opts = opts.sort(() => Math.random() - 0.5);
            
            return `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm max-w-2xl mx-auto mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full font-bold text-slate-500">${idx + 1}</span>
                        <button onclick="document.getElementById('hint-${section.id}-${idx}').classList.toggle('open')" class="text-amber-500 font-bold flex items-center gap-1">💡 تلميح</button>
                    </div>
                    <p class="text-2xl font-semibold mb-6 text-right">${q.q}</p>
                    <div id="hint-${section.id}-${idx}" class="collapsible-content bg-amber-50 rounded-2xl p-0 transition-all"><p class="p-4 text-amber-800 text-lg">${q.hint}</p></div>
                    <div class="grid grid-cols-1 gap-3 w-full max-w-md mx-auto mt-4">
                        ${opts.map((opt, i) => `
                            <button onclick="handleAnswer(this, '${section.id}', ${idx}, '${opt}', '${q.correct}')" class="flex items-center gap-4 p-4 text-right border-2 border-slate-100 rounded-2xl text-xl hover:border-blue-200 transition-all">
                                ${section.type !== 'tf' ? `<span class="w-7 h-7 flex-shrink-0 flex items-center justify-center bg-slate-50 rounded-full text-sm font-bold text-slate-400">${i+1}</span>` : ''}
                                <span>${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div id="fb-${section.id}-${idx}" class="hidden mt-4 p-4 rounded-2xl text-xl font-bold text-right transition-all"></div>
                </div>
            `;
        }

        function handleAnswer(btn, secId, qIdx, selected, correct) {
            const parent = btn.parentElement;
            if (parent.dataset.done) return;
            
            const isCorrect = selected === correct;
            btn.classList.add(isCorrect ? 'bg-green-50' : 'bg-red-50', isCorrect ? 'border-green-500' : 'border-red-500');
            
            const fb = document.getElementById(`fb-${secId}-${qIdx}`);
            fb.innerHTML = isCorrect ? "إجابة صحيحة! أحسنت." : "إجابة غير دقيقة، حاول التركيز في القاعدة.";
            fb.className = `mt-4 p-4 rounded-2xl text-xl font-bold text-right ${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            fb.classList.remove('hidden');
            
            document.getElementById(`hint-${secId}-${qIdx}`).classList.remove('open');
            parent.dataset.done = "true";
            
            state.scores[secId] = (state.scores[secId] || 0) + (isCorrect ? 1 : 0);
            state.answeredCount[secId] = (state.answeredCount[secId] || 0) + 1;
            
            updateProgress(secId);
        }

        function updateProgress(secId) {
            const sec = lessonData.sections.find(s => s.id === secId);
            const pct = (state.answeredCount[secId] / sec.questions.length) * 100;
            document.getElementById('sectionProgressBar').style.width = pct + '%';
            
            if (pct === 100) {
                state.completed.add(secId);
                document.getElementById(`check-${secId}`).classList.remove('hidden');
                if (state.completed.size === lessonData.sections.length) showFinal();
            }
        }

        function smartNavigate(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`sec-${id}`).classList.remove('hidden');
            
            lessonData.sections.forEach(s => {
                const btn = document.getElementById(`tab-${s.id}`);
                btn.classList.toggle('text-blue-600', s.id === id);
                btn.classList.toggle('text-slate-400', s.id !== id);
            });

            const offset = document.getElementById('stickyNav').offsetHeight + 20;
            window.scrollTo({ top: document.getElementById(`sec-${id}`).offsetTop - offset, behavior: 'smooth' });
        }

        function showFinal() {
            document.getElementById('finalResult').classList.remove('hidden');
            const total = Object.values(state.scores).reduce((a, b) => a + b, 0);
            document.getElementById('totalScore').innerText = total + " درجة";
        }

        window.onload = init;
    </script>
</body>
</html>
